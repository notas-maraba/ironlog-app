<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IronLog — Protótipo</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#080807" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="IronLog" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
  :root{
    --bg:#080807; --bgElevated:#161513;
    --card:#131210; --cardAlt:#1E1C18;
    --border:rgba(240,194,75,.35);
    --accent:#F0C24B; --accentSoft:rgba(240,194,75,.14);
    --active:#22C55E; --activeSoft:rgba(34,197,94,.16);
    --teal:#F0C24B; --tealSoft:rgba(240,194,75,.10);
    --danger:#FF6B5E;
    --text:#F5F1E8; --textDim:rgba(245,241,232,.65); --textFaint:rgba(245,241,232,.42);
    --btnBg:var(--accent); --btnText:#161208;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  .display{font-family:'Barlow Condensed',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{cursor:pointer;font-family:inherit;}
  input,select{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  #app{display:flex;min-height:100vh;}
  #sidebar{width:210px;padding:20px;flex-direction:column;gap:4px;background:var(--bgElevated);border-right:1px solid var(--border);color:var(--text);position:relative;transition:width .22s ease, padding .22s ease;overflow:hidden;}
  #sidebar.collapsed{width:64px;padding:20px 10px;}
  #sidebar.collapsed .label{display:none;}
  #sidebar.collapsed .navbtn{justify-content:center;}
  #sidebar.collapsed .logo{justify-content:center;}
  #sidebar-handle{position:absolute;top:22px;right:-13px;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#161208;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;z-index:5;padding:0;}
  #sidebar .logo{font-size:24px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:26px;color:var(--accent);}
  .navbtn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:transparent;border:none;color:var(--textDim);font-weight:600;font-size:14px;text-align:left;width:100%;}
  .navbtn.active{background:var(--activeSoft);color:var(--active);}
  #content{flex:1;padding:24px 24px 90px;max-width:920px;margin:0 auto;width:100%;}
  #bottomnav{position:fixed;bottom:0;left:0;right:0;background:#1C1A16;border-top:1px solid var(--border);display:none;flex-direction:column;padding:8px 10px;z-index:40;box-shadow:0 -4px 16px rgba(0,0,0,.4);gap:2px;}
  .bnbtn{background:none;border:none;display:flex;flex-direction:row;align-items:center;gap:12px;color:rgba(245,241,232,.65);font-size:15px;font-weight:600;padding:11px 10px;border-radius:10px;text-align:left;width:100%;}
  .bnbtn span:first-child{font-size:19px;width:22px;text-align:center;}
  .bnbtn.active{color:var(--active);background:var(--activeSoft);}
  @media (max-width:780px){
    #sidebar{display:none !important;}
    #bottomnav{display:flex !important;}
  }

  @media (max-width:780px){
    #content{padding:16px 14px 300px;}
    .btn-primary{padding:11px 16px;}
    .filterbtn{padding:8px 14px;}
    h1.pagetitle{font-size:24px;}
    .session-sticky button{font-size:12.5px;padding:9px 11px;}
    #resume-session-btn{bottom:300px;font-size:12px;padding:9px 14px;max-width:92vw;}
  }


  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px;
    color:var(--text);
  }
  .cardalt{background:var(--cardAlt);}

  .pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;display:inline-block;background:var(--bgElevated);color:var(--textDim);}
  .pill.accent{background:var(--accentSoft);color:var(--accent);}
  .pill.teal{background:var(--tealSoft);color:var(--teal);}
  .btn-primary{background:var(--btnBg);color:var(--btnText);border:none;border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;}
  .btn-ghost{background:var(--bgElevated);border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--text);min-width:38px;min-height:38px;display:inline-flex;align-items:center;justify-content:center;}
  .grid-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .stat{flex:1;min-width:130px;}
  .stat .lbl{display:flex;align-items:center;gap:8px;color:var(--textDim);font-size:12px;font-weight:600;margin-bottom:10px;}
  .stat .val{font-size:30px;font-weight:700;line-height:1;}
  .stat .sub{font-size:12px;color:var(--textFaint);margin-top:4px;}
  .exgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
  .excard{cursor:pointer;}
  .excard .thumb{height:90px;border-radius:10px;margin-bottom:10px;background:var(--cardAlt);display:flex;align-items:center;justify-content:center;font-size:28px;}
  .filterrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;}
  .filterbtn{background:var(--accentSoft);color:var(--accent);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;white-space:nowrap;}
  .filterbtn.active{background:var(--active);color:#0B2013;border-color:var(--active);}
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,14,8,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-sheet{background:var(--bg);border:1px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:20px;color:var(--text);}
  .field-lbl{font-size:12px;color:var(--textDim);margin-bottom:5px;font-weight:600;}
  .field-in{width:100%;background:var(--bgElevated);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;}
  .row{display:flex;gap:10px;}
  .setrow{display:flex;align-items:center;gap:8px;background:var(--bgElevated);border-radius:8px;padding:6px 8px;margin-bottom:6px;transition:background .2s;}
  .setrow.done{background:var(--active);}
  .setrow.done span{color:#fff;}
  .setrow.done .small-in{color:#fff;background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.4);}
  .checkbox{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--btnText);font-weight:700;}
  .checkbox.done{background:var(--active);border-color:var(--active);color:#fff;}
  #rest-banner{margin-bottom:16px;}
  .rest-card{border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;color:#fff;}
  .rest-card.counting{background:var(--card);}
  .rest-card.finished{background:var(--active);color:#0B2013;animation:pulseGreen 1s ease-in-out 2;}
  @keyframes pulseGreen{0%,100%{opacity:1;}50%{opacity:.6;}}
  .demo-anim{transition:transform 1.4s ease-in-out;}
  .demo-anim.playing{animation:liftmotion 1.3s ease-in-out infinite;}
  @keyframes liftmotion{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
  .small-in{width:50px;background:var(--bgElevated);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text);font-size:13px;}
  h1.pagetitle{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;margin:0 0 14px;color:var(--text);}
  .caldot{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;font-weight:600;}
  .session-sticky{position:sticky;top:0;background:var(--bg);z-index:30;padding:14px 0 10px;border-bottom:1px solid var(--border);margin:0 0 -1px;}
  #resume-session-btn{position:fixed;left:50%;transform:translateX(-50%);bottom:80px;background:var(--accent);color:#161208;border:none;border-radius:999px;padding:10px 16px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:45;cursor:pointer;}
  @media (min-width:781px){ #resume-session-btn{bottom:24px;} }
  .combo-sub{background:var(--cardAlt);border-radius:10px;padding:12px;}
  .combo-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .combo-header .stack-ico{font-size:16px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- DATA ---------------- */
const EXERCISES = [
  {id:"supino-reto",nome:"Supino reto com barra",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Bench_Press_-_Medium_Grip/0.jpg",grupo:"Peito",principais:["Peitoral maior"],secundarios:["Tríceps","Deltoide anterior"],equipamento:"Barra + banco reto",nivel:2,
   instrucoes:["Deite no banco com os pés firmes no chão e escápulas retraídas.","Pegada pouco mais larga que os ombros, barra alinhada com o peito.","Desça a barra de forma controlada até tocar levemente o peito.","Empurre a barra para cima estendendo os cotovelos sem travá-los.","Inspire na descida e expire na subida."],
   erros:["Arquear excessivamente a lombar","Deixar os cotovelos abrirem 90° em relação ao tronco","Quicar a barra no peito"],
   dica:"Mantenha os pulsos alinhados com o antebraço e os pés bem apoiados para gerar estabilidade."},
  {id:"supino-inclinado",nome:"Supino inclinado com halteres",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Incline_Dumbbell_Bench_With_Palms_Facing_In/0.jpg",grupo:"Peito",principais:["Peitoral maior (porção clavicular)"],secundarios:["Deltoide anterior","Tríceps"],equipamento:"Halteres + banco inclinado (30-45°)",nivel:2,
   instrucoes:["Ajuste o banco entre 30° e 45°.","Posicione os halteres na altura do peito com os cotovelos abaixo dos punhos.","Empurre os halteres para cima sem travar os cotovelos.","Desça controladamente até sentir alongamento no peito."],
   erros:["Inclinação acima de 45° (vira ombro)","Amplitude incompleta","Descer rápido demais"],
   dica:"Gire levemente os halteres no topo do movimento para maior contração do peitoral superior."},
  {id:"crucifixo",nome:"Crucifixo reto com halteres",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Flyes/0.jpg",grupo:"Peito",principais:["Peitoral maior"],secundarios:["Deltoide anterior"],equipamento:"Halteres + banco reto",nivel:2,
   instrucoes:["Deite no banco segurando os halteres acima do peito, cotovelos levemente flexionados.","Abra os braços em arco até a altura dos ombros.","Retorne pelo mesmo trajeto contraindo o peitoral."],
   erros:["Flexionar demais o cotovelo (vira supino)","Descer além da linha dos ombros sobrecarregando o ombro"],
   dica:"Imagine abraçar um tronco de árvore para manter o arco correto."},
  {id:"triceps-testa",nome:"Tríceps testa com barra W",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/EZ-Bar_Skullcrusher/0.jpg",grupo:"Tríceps",principais:["Tríceps braquial"],secundarios:[],equipamento:"Barra W + banco reto",nivel:2,
   instrucoes:["Deite no banco segurando a barra com os braços estendidos acima do peito.","Flexione os cotovelos levando a barra em direção à testa.","Estenda os cotovelos retornando à posição inicial."],
   erros:["Abrir os cotovelos durante o movimento","Usar impulso do ombro"],
   dica:"Mantenha os cotovelos fixos, apontando para o teto, durante toda a execução."},
  {id:"triceps-corda",nome:"Tríceps corda na polia",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Triceps_Pushdown_-_Rope_Attachment/0.jpg",grupo:"Tríceps",principais:["Tríceps braquial"],secundarios:[],equipamento:"Polia alta + corda",nivel:1,
   instrucoes:["Segure a corda com pegada neutra, cotovelos junto ao corpo.","Estenda os cotovelos empurrando a corda para baixo.","Abra levemente as mãos ao final do movimento.","Retorne controladamente."],
   erros:["Afastar os cotovelos do tronco","Inclinar o tronco para gerar impulso"],
   dica:"Fixe os cotovelos como se estivessem presos ao corpo do início ao fim."},
  {id:"puxada-frente",nome:"Puxada frente na polia",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Wide-Grip_Lat_Pulldown/0.jpg",grupo:"Costas",principais:["Latíssimo do dorso"],secundarios:["Bíceps","Romboides"],equipamento:"Polia alta + barra",nivel:1,
   instrucoes:["Sente-se com as coxas presas sob o apoio, pegada aberta.","Puxe a barra em direção à parte superior do peito.","Retorne controladamente até a extensão quase completa dos braços."],
   erros:["Puxar atrás da nuca","Usar impulso do tronco","Amplitude incompleta"],
   dica:"Pense em levar os cotovelos para baixo e para trás, não apenas puxar com os braços."},
  {id:"remada-curvada",nome:"Remada curvada com barra",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Bent_Over_Barbell_Row/0.jpg",grupo:"Costas",principais:["Latíssimo do dorso","Romboides"],secundarios:["Bíceps","Trapézio"],equipamento:"Barra livre",nivel:3,
   instrucoes:["Incline o tronco a aproximadamente 45°, joelhos levemente flexionados.","Puxe a barra em direção ao abdômen mantendo a coluna neutra.","Desça controladamente sem perder a postura."],
   erros:["Arredondar a coluna","Usar embalo do quadril","Puxar até o peito"],
   dica:"Mantenha o olhar para frente e o core contraído durante toda a série."},
  {id:"rosca-direta",nome:"Rosca direta com barra",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Curl/0.jpg",grupo:"Bíceps",principais:["Bíceps braquial"],secundarios:["Antebraço"],equipamento:"Barra reta ou W",nivel:1,
   instrucoes:["Fique em pé com a barra na altura das coxas, pegada supinada.","Flexione os cotovelos elevando a barra até a altura dos ombros.","Desça controladamente até a extensão completa."],
   erros:["Balançar o tronco para impulsionar","Mover os cotovelos para frente"],
   dica:"Mantenha os cotovelos colados ao tronco durante todo o movimento."},
  {id:"agachamento-livre",nome:"Agachamento livre com barra",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Squat/0.jpg",grupo:"Pernas",principais:["Quadríceps","Glúteos"],secundarios:["Isquiotibiais","Core"],equipamento:"Barra + rack",nivel:3,
   instrucoes:["Posicione a barra sobre o trapézio, pés na largura dos ombros.","Desça flexionando quadril e joelhos, mantendo o peito erguido.","Desça até pelo menos 90° de flexão do joelho.","Suba estendendo quadril e joelhos simultaneamente."],
   erros:["Joelhos colapsando para dentro","Calcanhar saindo do chão","Perder a curvatura neutra da lombar"],
   dica:"Empurre o chão com os pés como se fosse separá-lo ao meio."},
  {id:"leg-press",nome:"Leg press 45°",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Leg_Press/0.jpg",grupo:"Pernas",principais:["Quadríceps","Glúteos"],secundarios:["Isquiotibiais"],equipamento:"Máquina leg press",nivel:1,
   instrucoes:["Posicione os pés na plataforma na largura dos ombros.","Destrave o carro e desça controladamente flexionando os joelhos.","Empurre a plataforma sem travar totalmente os joelhos no topo."],
   erros:["Descer demais tirando o quadril do encosto","Travar os joelhos com carga alta"],
   dica:"Mantenha a lombar sempre apoiada no encosto do banco."},
  {id:"cadeira-extensora",nome:"Cadeira extensora",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Leg_Extensions/0.jpg",grupo:"Pernas",principais:["Quadríceps"],secundarios:[],equipamento:"Máquina extensora",nivel:1,
   instrucoes:["Ajuste o encosto para que o joelho fique alinhado ao eixo da máquina.","Estenda os joelhos elevando o peso até a extensão quase completa.","Desça controladamente sem soltar o peso."],
   erros:["Usar impulso do tronco","Descer o peso rápido demais"],
   dica:"Faça uma pausa de 1 segundo no topo do movimento para maior ativação."},
  {id:"desenvolvimento-militar",nome:"Desenvolvimento militar com barra",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Standing_Military_Press/0.jpg",grupo:"Ombros",principais:["Deltoide anterior","Deltoide medial"],secundarios:["Tríceps","Trapézio"],equipamento:"Barra livre",nivel:3,
   instrucoes:["Em pé, barra apoiada na altura da clavícula, pegada pouco mais larga que os ombros.","Empurre a barra para cima até a extensão completa dos braços.","Desça controladamente até a posição inicial."],
   erros:["Arquear excessivamente a lombar","Empurrar a barra para frente em vez de para cima"],
   dica:"Contraia o core e os glúteos para proteger a lombar durante o movimento."},
  {id:"elevacao-lateral",nome:"Elevação lateral com halteres",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Side_Lateral_Raise/0.jpg",grupo:"Ombros",principais:["Deltoide medial"],secundarios:[],equipamento:"Halteres",nivel:1,
   instrucoes:["Em pé, halteres ao lado do corpo, cotovelos levemente flexionados.","Eleve os braços lateralmente até a altura dos ombros.","Desça controladamente."],
   erros:["Usar impulso do tronco","Elevar acima da linha dos ombros","Cotovelos totalmente estendidos"],
   dica:"Imagine estar derramando água de uma jarra ao final do movimento."},
  {id:"panturrilha-em-pe",nome:"Panturrilha em pé",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Standing_Calf_Raises/0.jpg",grupo:"Pernas",principais:["Gastrocnêmio"],secundarios:["Sóleo"],equipamento:"Máquina de panturrilha",nivel:1,
   instrucoes:["Posicione os ombros sob o apoio, ponta dos pés na plataforma.","Desça os calcanhares o máximo possível para alongar.","Suba na ponta dos pés contraindo a panturrilha."],
   erros:["Amplitude curta","Movimento rápido sem controle"],
   dica:"Faça uma pausa de 1 a 2 segundos no topo da contração."},

  /* ---- Exercícios da rotina cadastrada (Planilha Novembro 2025) ---- */
  {id:"mobilidade-toracica-v",nome:"Mobilidade Torácica V",grupo:"Mobilidade",principais:["Coluna torácica"],secundarios:[],equipamento:"Peso do corpo",nivel:1,
   instrucoes:["Exercício de mobilidade específico da sua rotina — siga a orientação do vídeo ou do seu instrutor para a execução exata.","Priorize movimento controlado, sem forçar a amplitude."],

   instrucoes:["Sente-se com os joelhos levemente flexionados, pegada supinada no cabo.","Puxe o cabo em direção ao abdômen mantendo o tronco ereto.","Retorne controladamente sem arredondar a coluna."],
   erros:["Balançar o tronco para puxar","Encolher os ombros durante a puxada"],
   dica:"Leve os cotovelos para trás, próximos ao corpo, para ativar bem as costas."},
  {id:"rosca-direta-21",nome:"Rosca Direta 21 com Barra Reta",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Barbell_Curl/0.jpg",grupo:"Bíceps",principais:["Bíceps braquial"],secundarios:["Antebraço"],equipamento:"Barra reta",nivel:2,

   erros:["Usar impulso do corpo","Perder a postura ao longo da série"],
   dica:"O método 21 prioriza controle — use uma carga um pouco menor que o habitual."},
  {id:"rosca-direta-banco-inclinado",nome:"Rosca Direta com Barra Reta no Banco Inclinado",imagemUrl:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Incline_Dumbbell_Curl/0.jpg",grupo:"Bíceps",principais:["Bíceps braquial"],secundarios:[],equipamento:"Barra reta + banco inclinado",nivel:2,
   instrucoes:["Sente-se no banco inclinado com os braços estendidos para baixo.","Flexione os cotovelos elevando a barra.","Desça controladamente até a extensão completa."],
   erros:["Tirar os braços da linha do corpo","Usar impulso do ombro"],

function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.22,0.44].forEach((delay,i)=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = 880;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.001, ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+delay+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.18);
      o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.2);
    });
  }catch(e){}
}
function clearRestTimer(){ if(restHandle){ clearInterval(restHandle); restHandle=null; } }
function restTick(){
  if(!state.resting) return clearRestTimer();
  state.resting.remaining--;
  if(state.resting.remaining<=0){
    state.resting.remaining = 0;
    state.resting.finished = true;
    clearRestTimer();
    playBeep();
  }
  updateRestBanner();
}
function startRest(exI, setI, seconds, exNome){
  clearRestTimer();
  state.resting = { exI, setI, remaining: seconds, total: seconds, exNome, finished:false };
  updateRestBanner();
  restHandle = setInterval(restTick, 1000);
}
function updateRestBanner(){
  const el = document.getElementById("rest-banner");
  if(!el) return;
  if(!state.resting){ el.innerHTML = ""; return; }
  const r = state.resting;
  const m = String(Math.floor(r.remaining/60)).padStart(2,"0");
  const s = String(r.remaining%60).padStart(2,"0");
  el.innerHTML = r.finished
    ? `<div class="rest-card finished"><span style="font-size:20px;">✅</span><div><div style="font-weight:700;">Descanso concluído — hora da próxima série!</div><div style="font-size:12px;opacity:.9;">${r.exNome}</div></div>
        <button style="margin-left:auto;background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-weight:700;" data-dismissrest="1">OK</button></div>`
    : `<div class="rest-card counting"><span style="font-size:20px;">${ICO.clock}</span><div><div style="font-weight:700;">Descanso — ${r.exNome}</div><div style="font-size:12px;opacity:.85;">Próxima série em breve</div></div>
        <div class="mono" style="margin-left:auto;font-size:22px;font-weight:700;">${m}:${s}</div></div>`;
  const dismissBtn = document.getElementById("rest-banner").querySelector("[data-dismissrest]");
  if(dismissBtn) dismissBtn.onclick = ()=>{ state.resting = null; updateRestBanner(); };
}

/* ---------------- SVG LINE CHART (no deps, white-on-dark-panel) ---------------- */
function lineChartSVG(data, key, w=560, h=200){
  const pad = {t:14,r:14,b:26,l:34};
  const vals = data.map(d=>d[key]);
  const min = Math.min(...vals)*0.95, max = Math.max(...vals)*1.05;
  const x = i => pad.l + (i/(data.length-1)) * (w-pad.l-pad.r);
  const y = v => (h-pad.b) - ((v-min)/(max-min)) * (h-pad.t-pad.b);
  const pts = data.map((d,i)=>`${x(i)},${y(d[key])}`).join(" ");
  const gridY = [0,1,2,3].map(i => pad.t + i*((h-pad.t-pad.b)/3));
  return `
  <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
    ${gridY.map(gy=>`<line x1="${pad.l}" y1="${gy}" x2="${w-pad.r}" y2="${gy}" stroke="rgba(255,255,255,.25)" stroke-dasharray="3 3"/>`).join("")}
    <polyline points="${pts}" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    ${data.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d[key])}" r="3.5" fill="#FFFFFF"/>`).join("")}
    ${data.map((d,i)=>`<text x="${x(i)}" y="${h-8}" font-size="10" fill="rgba(255,255,255,.65)" text-anchor="middle" font-family="Inter">${d.data}</text>`).join("")}
  </svg>`;
}

function updateTimer(){
  if(!state.session) return;
  const secs = Math.floor((Date.now()-state.session.startTime)/1000);

  const s = String(secs%60).padStart(2,"0");
  const txt = `${m}:${s}`;
  const el = document.getElementById("session-timer");
  if(el) el.textContent = txt;
  const floatEl = document.getElementById("floating-timer");
  if(floatEl) floatEl.textContent = txt;
}

function youtubeId(url){
  if(!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]+)/);
  return m ? m[1] : null;
}

function renderCalendar(){
  const year=2026, month=2; // Março (0-indexed)
  const sessionByDay = {};
  trainedSessions.forEach(s=> sessionByDay[s.dia] = s.workoutId);
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const weekdays = ["D","S","T","Q","Q","S","S"];
  let cells = "";
  for(let i=0;i<firstDay;i++) cells += `<div></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const wId = sessionByDay[d];
    if(wId){
      const letra = findWorkoutById(wId).nome.replace("Treino ","");
      cells += `<div class="caldot" style="background:var(--active);color:#0B2013;flex-direction:column;line-height:1;gap:1px;" title="${findWorkoutById(wId).nome}">
        <span style="font-size:11px;">${d}</span><span style="font-size:8px;font-weight:800;">${letra}</span>
      </div>`;
    } else {
      cells += `<div class="caldot" style="opacity:.5;">${d}</div>`;
    }
  }
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-weight:700;font-size:15px;">${ICO.calendar} Março 2026</div>
      <div style="font-size:12px;opacity:.85;">${trainedSessions.length} dias treinados</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;">
      ${weekdays.map(w=>`<div style="text-align:center;font-size:10px;opacity:.6;">${w}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;">${cells}</div>
    <div style="font-size:12px;font-weight:700;margin-bottom:8px;opacity:.9;">HISTÓRICO DO MÊS</div>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;">
      ${[...trainedSessions].sort((a,b)=>b.dia-a.dia).map(s=>{
        const w = findWorkoutById(s.workoutId);
        return `<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.15);padding-bottom:6px;">
          <span style="font-size:13px;">${String(s.dia).padStart(2,"0")}/03</span>
          <span class="pill" style="background:rgba(255,255,255,.18);color:#fff;">${w.nome} · ${w.grupo}</span>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function classificarIMC(imc){
  if(imc < 18.5) return "Abaixo do peso";
  if(imc < 25) return "Peso normal";
  if(imc < 30) return "Sobrepeso";
  if(imc < 35) return "Obesidade Grau I";
  if(imc < 40) return "Obesidade Grau II";
  return "Obesidade Grau III";
}

function renderProgresso(){
  const exId = state.progressEx;
  const data = progressLog[exId];
  const ex = findEx(exId);
  const first = data[0], last = data[data.length-1];
  const variacao = (((last.carga-first.carga)/first.carga)*100).toFixed(0);

  const wFirst = bodyWeightLog[0], wLast = bodyWeightLog[bodyWeightLog.length-1];
  const variacaoPeso = (((wLast.peso-wFirst.peso)/wFirst.peso)*100).toFixed(1);

  const alturaM = profile.altura/100;
  const imc = (wLast.peso / (alturaM*alturaM));
  const classificacao = classificarIMC(imc);

  return `

    <div class="card" style="margin-bottom:20px;">

    </div>

    <div style="font-size:12px;font-weight:700;color:var(--textDim);margin-bottom:8px;">EVOLUÇÃO CORPORAL</div>
    <div class="grid-stats">
      <div class="card stat"><div class="lbl">${ICO.weight} PESO ATUAL</div><div class="display val">${wLast.peso} kg</div></div>
      <div class="card stat"><div class="lbl">${ICO.trend} VARIAÇÃO NO PERÍODO</div><div class="display val">${variacaoPeso}%</div><div class="sub">${wFirst.data} → ${wLast.data}</div></div>
      <div class="card stat"><div class="lbl">🎯 META</div><div class="display val">80 kg</div><div class="sub">Faltam ${(wLast.peso-80).toFixed(1)} kg</div></div>
    </div>
    <div class="card" style="margin-bottom:24px;">${lineChartSVG(bodyWeightLog,"peso",560,180)}</div>

    <div style="font-size:12px;font-weight:700;color:var(--textDim);margin-bottom:8px;">CARGA POR EXERCÍCIO</div>
    <div class="filterrow">
      ${Object.keys(progressLog).map(id=>`<button class="filterbtn ${exId===id?'active':''}" data-progex="${id}">${findEx(id).nome}</button>`).join("")}
    </div>
    <div class="grid-stats">
      <div class="card stat"><div class="lbl">${ICO.trophy} RECORDE PESSOAL</div><div class="display val">${Math.max(...data.map(d=>d.carga))} kg</div></div>
      <div class="card stat"><div class="lbl">${ICO.trend} EVOLUÇÃO NO PERÍODO</div><div class="display val">${variacao>0?'+':''}${variacao}%</div><div class="sub">${first.data} → ${last.data}</div></div>
      <div class="card stat"><div class="lbl">${ICO.dumbbell} ÚLTIMA SESSÃO</div><div class="display val">${last.carga}kg × ${last.reps}</div></div>
    </div>
    ${variacao>0?`<div class="card" style="margin-bottom:16px;display:flex;gap:8px;align-items:center;">

/* ---------------- BUILDER ---------------- */
function groupItemsForBuilder(itens){
  const groups = [];
  let i = 0;
  while(i < itens.length){
    const combo = itens[i].combo;
    if(combo){
      const items = [];
      let j = i;
      while(j < itens.length && itens[j].combo === combo){ items.push({item:itens[j], index:j}); j++; }
      groups.push({type:"combo", comboId:combo, items});
      i = j;
    } else {
      groups.push({type:"single", item:itens[i], index:i});
      i++;
    }
  }
  return groups;
}

/* ---------------- SESSION ---------------- */
function groupLogEntries(log){
  const groups = [];
  let i = 0;
  while(i < log.length){
    const combo = log[i].alvo.combo;
    if(combo){
      const items = [];
      let j = i;
      while(j < log.length && log[j].alvo.combo === combo){ items.push({entry:log[j], exI:j}); j++; }
      groups.push({type:"combo", comboId:combo, items});
      i = j;
    } else {
      groups.push({type:"single", entry:log[i], exI:i});
      i++;
    }
  }
  return groups;
}

/* ---------------- EVENTS ---------------- */
function attachEvents(){
  document.querySelectorAll("[data-nav]").forEach(el=>el.onclick=()=>setState({tab:el.dataset.nav, viewingSession:false}));
  const resumeBtn = document.getElementById("resume-session-btn");
  if(resumeBtn) resumeBtn.onclick=()=>setState({viewingSession:true});
  const sidebarHandle = document.getElementById("sidebar-handle");
  if(sidebarHandle) sidebarHandle.onclick=()=>setState({sidebarCollapsed:!state.sidebarCollapsed});
  document.querySelectorAll("[data-start]").forEach(el=>el.onclick=()=>{
    const w = workouts.find(x=>x.id===el.dataset.start);
    const log = w.itens.map(it=>({exId:it.exId, alvo:it, series:Array.from({length:it.series},()=>({carga:it.carga, reps:it.reps.split("-")[0], done:false}))}));
    setState({session:{...w, log, startTime:Date.now()}, viewingSession:true});
  });
  document.querySelectorAll("[data-toggleset]").forEach(el=>el.onclick=()=>{
    const [exI,setI] = el.dataset.toggleset.split("-").map(Number);
    const entry = state.session.log[exI];
    const nowDone = !entry.series[setI].done;
    entry.series[setI].done = nowDone;
    if(nowDone){
      const ex = findEx(entry.exId);
      startRest(exI, setI, entry.alvo.descanso, ex.nome);
    } else if(state.resting && state.resting.exI===exI && state.resting.setI===setI){
      clearRestTimer(); state.resting = null;
    }
    render();
  });
  document.querySelectorAll("[data-setfield]").forEach(el=>el.onchange=()=>{
    const [exI,setI] = el.dataset.set.split("-").map(Number);
    state.session.log[exI].series[setI][el.dataset.setfield] = el.value;
  });
  const finishBtn = document.querySelector("[data-finish]");
  if(finishBtn) finishBtn.onclick=()=>setState({confirmAction:"finish"});
  const giveupBtn = document.querySelector("[data-giveup]");
  if(giveupBtn) giveupBtn.onclick=()=>setState({confirmAction:"giveup"});
  const pauseBtn = document.getElementById("pause-btn");
  if(pauseBtn) pauseBtn.onclick=()=>{
    if(!state.session.paused){
      state.session.paused = true;
      state.session.pausedAt = Date.now();
      if(timerHandle){ clearInterval(timerHandle); timerHandle=null; }
      if(restHandle){ clearInterval(restHandle); restHandle=null; }
    } else {
      const pausedDuration = Date.now() - state.session.pausedAt;
      state.session.startTime += pausedDuration;
      state.session.paused = false;
      state.session.pausedAt = null;
      timerHandle = setInterval(updateTimer, 1000);
      updateTimer();
      if(state.resting && !state.resting.finished){ restHandle = setInterval(restTick, 1000); }
    }
    render();
  };
  const cancelConfirmBtn = document.querySelector("[data-cancelconfirm]");
  if(cancelConfirmBtn) cancelConfirmBtn.onclick=()=>setState({confirmAction:null});
  const confirmActionBtn = document.querySelector("[data-confirmaction]");
  if(confirmActionBtn) confirmActionBtn.onclick=()=>{
    if(state.confirmAction==="finish"){
      setState({confirmAction:null, finishModalOpen:true});
    } else {
      if(timerHandle){ clearInterval(timerHandle); timerHandle=null; }
      clearRestTimer();
      setState({session:null, confirmAction:null, resting:null, viewingSession:false, tab:"dashboard"});
    }
  };
  const confirmFinishBtn = document.querySelector("[data-confirmfinish]");
  if(confirmFinishBtn) confirmFinishBtn.onclick=()=>{
    const cal = document.getElementById("finish-calorias").value;
    setState({session:null, finishModalOpen:false, viewingSession:false, tab:"dashboard"});
    if(cal){ setTimeout(()=>alert(`Treino salvo! Calorias registradas: ${cal} kcal.`),50); }
  };

  document.querySelectorAll("[data-edit]").forEach(el=>el.onclick=()=>setState({builderOpen:true, builderData:JSON.parse(JSON.stringify(workouts.find(w=>w.id===el.dataset.edit)))}));
  document.querySelectorAll("[data-dup]").forEach(el=>el.onclick=()=>{
    const w = workouts.find(x=>x.id===el.dataset.dup);
    workouts.push({...JSON.parse(JSON.stringify(w)), id:"w"+Date.now(), nome:w.nome+" (cópia)"});
    render();
  });
  document.querySelectorAll("[data-del]").forEach(el=>el.onclick=()=>{
    workouts = workouts.filter(w=>w.id!==el.dataset.del);
    if(state.treinosTab===el.dataset.del) state.treinosTab = workouts[0] ? workouts[0].id : null;
    render();
  });
  const newWBtn = document.querySelector("[data-newworkout]");
  if(newWBtn) newWBtn.onclick=()=>setState({builderOpen:true, builderData:{id:null,nome:"",grupo:"",itens:[]}});

  document.querySelectorAll("[data-treinostab]").forEach(el=>el.onclick=()=>setState({treinosTab:el.dataset.treinostab}));
  document.querySelectorAll("[data-addcarga]").forEach(el=>el.onclick=()=>setState({addCargaExId:el.dataset.addcarga}));
  document.querySelectorAll("[data-closeaddcarga]").forEach(el=>el.onclick=()=>setState({addCargaExId:null}));
  const saveAddCargaBtn = document.querySelector("[data-saveaddcarga]");
  if(saveAddCargaBtn) saveAddCargaBtn.onclick=()=>{
    const carga = document.getElementById("ac-carga").value;
    const reps = document.getElementById("ac-reps").value;
    if(carga && reps){
      const exId = state.addCargaExId;
      if(!progressLog[exId]) progressLog[exId] = [];
      const now = new Date();
      const dataStr = String(now.getDate()).padStart(2,"0")+"/"+String(now.getMonth()+1).padStart(2,"0");
      progressLog[exId].push({data:dataStr, carga:Number(carga), reps:Number(reps)});
      setState({progressEx:exId, addCargaExId:null});
    } else {
      setState({addCargaExId:null});
    }
  };

  document.querySelectorAll("[data-filter]").forEach(el=>el.onclick=()=>setState({libFilter:el.dataset.filter}));
  document.querySelectorAll("[data-libdetail]").forEach(el=>el.onclick=()=>setState({libDetail:el.dataset.libdetail}));
  document.querySelectorAll("[data-closelib]").forEach(el=>el.onclick=()=>setState({libDetail:null}));
  const demoToggle = document.getElementById("demo-toggle");
  if(demoToggle) demoToggle.onclick=()=>{
    const anim = document.getElementById("demo-anim");
    const playing = anim.classList.toggle("playing");
    demoToggle.innerHTML = playing ? "⏸ Pausar" : `${ICO.play} Assistir`;
  };
  const exPhoto = document.getElementById("ex-photo");
  if(exPhoto) exPhoto.onerror = function(){
    const wrap = this.parentElement;
    this.remove();
    const msg = document.createElement("div");
    msg.style.padding = "24px";
    msg.style.textAlign = "center";
    msg.style.fontSize = "12px";
    msg.style.opacity = ".8";
    msg.textContent = "Não foi possível carregar a foto — verifique sua conexão com a internet.";
    wrap.prepend(msg);
  };
  document.querySelectorAll("[data-openexedit]").forEach(el=>el.onclick=()=>setState({exerciseEditOpen:el.dataset.openexedit}));
  document.querySelectorAll("[data-closeexedit]").forEach(el=>el.onclick=()=>setState({exerciseEditOpen:null}));
  const saveExEditBtn = document.querySelector("[data-saveexedit]");
  if(saveExEditBtn) saveExEditBtn.onclick=()=>{
    const ex = findEx(state.exerciseEditOpen);
    if(ex){
      ex.nome = document.getElementById("ee-nome").value || ex.nome;
      ex.grupo = document.getElementById("ee-grupo").value || ex.grupo;
      ex.equipamento = document.getElementById("ee-equipamento").value;
      const img = document.getElementById("ee-imagem").value.trim();
      const vid = document.getElementById("ee-video").value.trim();
      if(img) ex.imagemUrl = img; else delete ex.imagemUrl;
      if(vid) ex.videoUrl = vid; else delete ex.videoUrl;
    }
    setState({exerciseEditOpen:null});
  };

  document.querySelectorAll("[data-progex]").forEach(el=>el.onclick=()=>setState({progressEx:el.dataset.progex}));
  const openAddWeightBtn = document.querySelector("[data-openaddweight]");
  if(openAddWeightBtn) openAddWeightBtn.onclick=()=>setState({addWeightOpen:true});
  const closeAddWeightBtn = document.querySelector("[data-closeaddweight]");
  if(closeAddWeightBtn) closeAddWeightBtn.onclick=()=>setState({addWeightOpen:false});
  const saveAddWeightBtn = document.querySelector("[data-saveaddweight]");
  if(saveAddWeightBtn) saveAddWeightBtn.onclick=()=>{
    const peso = document.getElementById("aw-peso").value;
    if(peso){
      const now = new Date();
      const dataStr = String(now.getDate()).padStart(2,"0")+"/"+String(now.getMonth()+1).padStart(2,"0");
      bodyWeightLog.push({data:dataStr, peso:Number(peso)});
      profile.peso = Number(peso);
    }
    setState({addWeightOpen:false});
  };

  const saveProfileBtn = document.querySelector("[data-saveprofile]");
  if(saveProfileBtn) saveProfileBtn.onclick=()=>{
    profile.nome = document.getElementById("p-nome").value;
    profile.idade = document.getElementById("p-idade").value;
    profile.peso = document.getElementById("p-peso").value;
    profile.altura = document.getElementById("p-altura").value;
    profile.nivel = document.getElementById("p-nivel").value;
    profile.objetivo = document.getElementById("p-objetivo").value;
    render();
  };

  const closeBuilder = document.querySelector("[data-closebuilder]");
  if(closeBuilder) closeBuilder.onclick=()=>setState({builderOpen:false, builderData:null});
  const togglePicker = document.querySelector("[data-togglepicker]");
  if(togglePicker) togglePicker.onclick=()=>{
    const p = document.getElementById("b-picker");
    p.style.display = p.style.display==="none" ? "block" : "none";
  };
  document.querySelectorAll("[data-addex]").forEach(el=>el.onclick=()=>{
    state.builderData.itens.push({exId:el.dataset.addex, series:3, reps:"10-12", carga:20, descanso:60, obs:""});
    render();
    setTimeout(()=>{ const p=document.getElementById("b-picker"); if(p) p.style.display="block"; },0);
  });
  document.querySelectorAll("[data-removeitem]").forEach(el=>el.onclick=()=>{
    const idx = Number(el.dataset.removeitem);
    const removedCombo = state.builderData.itens[idx].combo;
    state.builderData.itens.splice(idx,1);
    if(removedCombo){
      const remaining = state.builderData.itens.filter(it=>it.combo===removedCombo);
      if(remaining.length < 2) remaining.forEach(it=>delete it.combo);
    }
    render();
  });
  document.querySelectorAll("[data-combo]").forEach(el=>el.onclick=()=>{
    const idx = Number(el.dataset.combo);
    const comboId = "combo-"+Date.now();
    state.builderData.itens[idx].combo = comboId;
    if(state.builderData.itens[idx+1]) state.builderData.itens[idx+1].combo = comboId;
    render();
  });
  document.querySelectorAll("[data-uncombo]").forEach(el=>el.onclick=()=>{
    const comboId = el.dataset.uncombo;
    state.builderData.itens.forEach(it=>{ if(it.combo===comboId) delete it.combo; });
    render();
  });
  document.querySelectorAll("[data-field]").forEach(el=>el.onchange=()=>{
    const idx = Number(el.dataset.idx);
    state.builderData.itens[idx][el.dataset.field] = el.type==="number" ? Number(el.value) : el.value;
  });
  const saveWorkoutBtn = document.querySelector("[data-saveworkout]");
  if(saveWorkoutBtn) saveWorkoutBtn.onclick=()=>{
    const nome = document.getElementById("b-nome").value || "Novo treino";
    const grupo = document.getElementById("b-grupo").value || "Geral";
    const w = { id: state.builderData.id || "w"+Date.now(), nome, grupo, itens: state.builderData.itens };
    const idx = workouts.findIndex(x=>x.id===w.id);
    if(idx>=0) workouts[idx]=w; else workouts.push(w);
    setState({builderOpen:false, builderData:null});
  };
}

render();
</script>
</body>
</html>
